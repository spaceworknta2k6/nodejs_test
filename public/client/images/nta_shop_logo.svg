<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" role="img" aria-labelledby="title desc">
  <title id="title">NTA Shop Logo</title>
  <desc id="desc">Modern shopping bag logo with the text nta shop</desc>
  <defs>
    <linearGradient id="bagGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e90ff"/>
      <stop offset="100%" stop-color="#0b5ed7"/>
    </linearGradient>
    <linearGradient id="swooshGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8a00"/>
      <stop offset="100%" stop-color="#ffb000"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0b1320" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)" transform="translate(24,18)">
    <path d="M64 44h92c10 0 18 8 18 18v48c0 10-8 18-18 18H52c-10 0-18-8-18-18V74c0-16 14-30 30-30z" fill="url(#bagGrad)"/>
    <path d="M72 44c0-22 15-36 36-36s36 14 36 36" fill="none" stroke="#ff8a00" stroke-width="10" stroke-linecap="round"/>
    <circle cx="82" cy="70" r="4" fill="#ffffff" fill-opacity="0.35"/>
    <circle cx="126" cy="70" r="4" fill="#ffffff" fill-opacity="0.35"/>
    <path d="M14 104c28-28 78-40 140-32 10 1 16 13 10 21-28 36-86 52-148 40-15-3-18-18-2-29z" fill="url(#swooshGrad)"/>
    <path d="M18 102c24-18 49-28 75-32" fill="none" stroke="#ff6a00" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-weight="700">
    <text x="230" y="100" font-size="68" fill="#0d6efd" letter-spacing="1">nta</text>
    <text x="372" y="100" font-size="68" fill="#ff7a00" letter-spacing="1">shop</text>
  </g>
